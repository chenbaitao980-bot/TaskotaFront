name: smart_assistant
description: "AI智能日程管家 - 帮你拆解目标、消除不确定性、修正人生路径的AI秘书管家"
publish_to: 'none'
version: 1.0.0+3

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # 状态管理
  flutter_bloc: ^9.1.0
  equatable: ^2.0.7
  
  # 云端同步 - Supabase
  supabase_flutter: ^2.8.0
  
  # 日历视图
  table_calendar: ^3.2.0
  
  # 本地存储
  shared_preferences: ^2.5.0
  
  # 网络请求
  dio: ^5.8.0
  
  # JSON序列化
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.4
  
  # 语音录入
  speech_to_text: ^7.0.0
  
  # 通知（用本地计划；flutter_local_notifications_windows 在 Dart 3.11+ AOT 编译时有 FFI 崩溃，仅在 Android/iOS/macOS 启用）
  
  # 自定义字体
  google_fonts: ^6.2.1

  # UI组件
  flutter_screenutil: ^5.9.3
  shimmer: ^3.0.0
  flutter_slidable: ^4.0.0
  
  # 工具
  intl: ^0.20.0
  uuid: ^4.5.0
  logger: ^2.5.0

  # 本地数据库
  drift: ^2.24.0
  sqlite3: ^2.9.0
  sqlite3_flutter_libs: ^0.5.28
  path_provider: ^2.1.5
  path: ^1.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  json_serializable: ^6.9.0
  freezed: ^2.5.7
  drift_dev: ^2.24.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
