name: smart_assistant
description: "AI智能日程管家 - 帮你拆解目标、消除不确定性、修正人生路径的AI秘书管家"
publish_to: 'none'
version: 1.0.0+3

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # 状态管理
  flutter_bloc: ^9.1.0
  equatable: ^2.0.7
  
  # 云端同步 - Supabase
  supabase_flutter: ^2.8.0
  
  # 日历视图
  table_calendar: ^3.2.0
  
  # 本地存储
  shared_preferences: ^2.5.0
  
  # 网络请求
  dio: ^5.8.0
  
  # JSON序列化
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.4
  
  # 语音录入
  speech_to_text: ^7.0.0
  
  # 本地通知（用于桌面端和移动端提醒）
  flutter_local_notifications: ^19.5.0
  flutter_local_notifications_windows: ^1.0.3
  timezone: ^0.10.1
  # 闹钟式提醒（绕过静音，支持全屏唤醒）
  alarm: ^5.4.1
  
  # 自定义字体
  google_fonts: ^6.2.1

  # UI组件
  flutter_screenutil: ^5.9.3
  shimmer: ^3.0.0
  flutter_slidable: ^4.0.0
  
  # 文件选择器 + 打开文件
  file_picker: ^8.3.7
  open_filex: ^4.5.0
  excel: ^4.0.6
  archive: ^3.6.1
  xml: ">=5.0.0 <7.0.0"
  
  # Markdown 渲染
  flutter_markdown: ^0.7.6

  # 二维码生成（VIP支付宝扫码支付）
  qr_flutter: ^4.1.0

  # 工具
  intl: ^0.20.0
  uuid: ^4.5.0
  logger: ^2.5.0

  # 本地数据库
  drift: ^2.24.0
  sqlite3: ^2.9.0
  sqlite3_flutter_libs: ^0.5.28
  path_provider: ^2.1.5
  path: ^1.9.1
  system_tray: ^0.1.1
  window_manager: ^0.5.1
  super_clipboard: ^0.9.1
  desktop_drop: ^0.7.1
  flutter_timezone: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  json_serializable: ^6.9.0
  freezed: ^2.5.7
  drift_dev: ^2.24.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icons/app_icon_1024.png"
  windows:
    generate: true
    image_path: "assets/icons/app_icon_1024.png"
    icon_size: 256

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/audio/
